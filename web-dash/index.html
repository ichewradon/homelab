<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>ichewradon's homelab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicons/favicon.svg" />
  <link rel="shortcut icon" href="favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="homelab" />
  <link rel="manifest" href="favicons/site.webmanifest" />
</head>

<body>

<div class="grid">
  <div class="item item-1" onClick="window.location.href=window.location.href">
    <img src="images/logos/fulllogo.svg" style="height: 5cqw;">
    <div class="social-links">
        <a href="https://github.com/ichewradon/homelab" target="_blank" style="text-decoration: none;">
          <img src="images/logos/github.svg" style="width: 30px; height: 30px;">
        </a>
        <a href="https://ichewradon.com" target="_blank" style="text-decoration: none;">
          <i data-lucide="link"></i>
        </a>
    </div>
</div>

  <div class="item item-2">
    <div class="sub-title">TL-SG105S</div>
    <div class="connections">
      <div class="connections" id="port1">Port 1 <span class="status online" title="Server Online"></span></div>
      <div class="connections" id="port2">Port 2 <span class="status warn" title="Server Online"></span></div>
      <div class="connections" id="port3">Port 3 <span class="status unknown" title="Server Online"></span></div>
      <div class="connections" id="port4">Port 4 <span class="status offline" title="Server Offline"></span></div>
    </div>
  </div>

  <div class="item item-3" onclick="location.href='devices/rpi4b'" style="filter: invert(21%) sepia(100%) saturate(7491%) hue-rotate(0deg) brightness(100%) contrast(104%);">
    <img src="images/rpi4b.svg" style="width: 35%;">
    <div>
        <div class="title">
            Raspberry Pi 4B
        </div>
        <div class="description">
            raspberry.local
        </div>
        <div class="description">
            127.0.0.1
        </div>
        <img src="images/qr-codes/exampleqr.svg" style="width: 150px; position: absolute; bottom: 15px; right: 15px;"/>
    </div>
  </div>

  <div class="item item-4" style="filter: grayscale(100%);">
    <img src="images/rpi4b.svg" style="width: 35%;">
    <div>
        <div class="title">
            Raspberry Pi 3B+
        </div>
        <div class="description">
            raspberry.local
        </div>
        <div class="description">
            127.0.0.1
        </div>
        <img src="images/qr-codes/exampleqr.svg" style="width: 150px; position: absolute; bottom: 15px; right: 15px;"/>
    </div>
  </div>

  <div class="item item-5">
    <div class="sub-title">
      Uptime
    </div>
    <div class="uptime-value">
      <div class="sub-title" id="uptime">3d 4h 27m</div>
    </div>
  </div>

  <div class="item item-6"><div class="sub-title">Avg Temp</div></div>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons({attrs: {'stroke-width': 2}});
</script>

</body>
</html>
